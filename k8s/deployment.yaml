apiVersion: apps/v1
kind: Deployment
metadata:
  name: manshade
  namespace: manshade
  labels:
    app: manshade
spec:
  replicas: 2
  selector:
    matchLabels:
      app: manshade
  template:
    metadata:
      labels:
        app: manshade
    spec:
      containers:
        - name: app
          image: manshade:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: manshade-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
