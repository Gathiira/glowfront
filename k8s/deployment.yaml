apiVersion: apps/v1
kind: Deployment
metadata:
  name: glowfront
  namespace: glowfront
  labels:
    app: glowfront
spec:
  replicas: 2
  selector:
    matchLabels:
      app: glowfront
  template:
    metadata:
      labels:
        app: glowfront
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/gathiira/glowfront:sha-d2b9ade
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: glowfront-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
