apiVersion: apps/v1
kind: Deployment
metadata:
  name: glowfront
  namespace: glowfront
  labels:
    app: glowfront
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: glowfront

  template:
    metadata:
      labels:
        app: glowfront
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: app
          image: ghcr.io/gathiira/glowfront:sha-5a28c34
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000
              name: http

          envFrom:
            - configMapRef:
                name: glowfront-config

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
